[benchmarks.swe_bench_verified]
dataset_path = ".cache/interleave_codebench/v0_1/swe_bench_verified/tasks.json"

[benchmarks.swe_ci]
dataset_path = ".cache/interleave_codebench/v0_1/swe_ci/tasks.csv"

[pilot]
dev_episodes = 2
eval_episodes = 2
seed = 11
max_total_actions = 12
max_actions_per_task = 6
slice_budget = 1

[runner]
output_dir = ".runs/v0_1_realistic"
memory_tail_events = 8

[agent]
kind = "external_cli_json"
name = "codex"
command = [
  "codex",
  "exec",
  "--skip-git-repo-check",
  "--ephemeral",
  "--sandbox",
  "read-only",
  "--color",
  "never",
  "--output-schema",
  "{schema_path}",
  "-o",
  "{response_path}",
  "-C",
  "{workspace_path}",
  "-"
]
timeout_seconds = 240
